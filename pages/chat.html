<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Messagerie Bazzart. Communiquez directement avec les vendeurs et acheteurs.">
    <meta name="keywords" content="messagerie, chat, messages, communication">
    <meta name="author" content="Bazzart Team">
    <meta name="robots" content="noindex, follow">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Bazzart | Messagerie">
    <meta property="og:description" content="Chat avec vendeurs et acheteurs">
    <meta property="og:url" content="https://bazzart.tn/pages/chat.html">
    <link rel="canonical" href="https://bazzart.tn/pages/chat.html">
    <title>Bazzart | Messagerie</title>
    <link rel="icon" type="image/png" href="../assets/images/Logo.png">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/components.css">
  </head>
  <body>
    <div id="siteHeaderMount"></div>

    <main class="page-main container">
      <nav class="breadcrumb" aria-label="Fil d Ariane">
        <a href="../index.html">Accueil</a>
        <span>/</span>
        <strong>Messages</strong>
      </nav>

      <header class="page-head">
        <h1>Messagerie</h1>
        <p>Communiquez directement avec les vendeurs et acheteurs.</p>
      </header>

      <section class="chat-layout">
        <aside class="chat-conversations">
          <input id="searchConversations" class="input" type="text" placeholder="Rechercher une conversation...">
          <div id="conversationsList" class="conversations-list">
            <!-- Completée par JavaScript -->
          </div>
        </aside>

        <article class="chat-window">
          <div id="chatHeader" class="chat-header" style="display:none;">
            <h2 id="chatWithName"></h2>
            <p id="chatWithShop"></p>
          </div>

          <div id="noConversation" class="empty-state" style="padding: 40px;">
            <h3>Aucune conversation selectionnee</h3>
            <p>Selectionnez une conversation pour commencer.</p>
          </div>

          <div id="messagesList" class="messages-list" style="display:none;"></div>

          <form id="messageForm" class="message-input-form" style="display:none;">
            <textarea id="messageInput" class="textarea" rows="2" placeholder="Ecrivez votre message..." required></textarea>
            <button class="btn btn-cta" type="submit">Envoyer</button>
          </form>
        </article>
      </section>
    </main>

    <div id="siteFooterMount"></div>

    <script src="../assets/js/data.js"></script>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/store.js"></script>
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/chat.js"></script>
  </body>
</html>
