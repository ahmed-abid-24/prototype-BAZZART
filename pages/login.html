<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Connectez-vous à votre compte Bazzart. Accédez à vos commandes, wishlist et paramètres de compte.">
    <meta name="keywords" content="connexion, login, compte utilisateur, artisanat tunisien">
    <meta name="author" content="Bazzart Team">
    <meta name="robots" content="index, follow">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Bazzart | Connexion">
    <meta property="og:description" content="Connectez-vous à votre compte Bazzart">
    <meta property="og:url" content="https://bazzart.tn/pages/login.html">
    <link rel="canonical" href="https://bazzart.tn/pages/login.html">
    <title>Bazzart | Connexion</title>
    <link rel="icon" type="image/png" href="../assets/images/Logo.png">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/components.css">
  </head>
  <body>
    <div id="siteHeaderMount"></div>

    <main class="page-main container">
      <header class="page-head">
        <h1>Connexion / Inscription</h1>
        <p>Connectez-vous comme acheteur ou vendeur pour acceder a votre espace.</p>
      </header>

      <section style="max-width:520px; margin:0 auto;" class="store-card">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:18px; border-bottom:1px solid var(--border); padding-bottom:14px;">
          <button class="login-tab-btn is-active" data-role="buyer" type="button">Acheteur</button>
          <button class="login-tab-btn" data-role="seller" type="button">Vendeur</button>
        </div>

        <form id="loginForm" style="display:grid; gap:12px;">
          <label>Email
            <input class="input" type="email" name="email" required autocomplete="email">
          </label>
          <label>Mot de passe
            <input class="input" type="password" name="password" required autocomplete="current-password" minlength="6">
          </label>
          <input type="hidden" name="role" value="buyer">
          <button class="btn btn-primary" type="submit">Se connecter</button>
          <a class="btn btn-ghost" href="register-vendeur.html">Creer un compte vendeur</a>
        </form>

        <div style="margin-top:14px; padding-top:14px; border-top:1px solid var(--border); font-size:13px; color:var(--text-muted); line-height:1.6;">
          <p><strong>Compte test:</strong></p>
          <p>Email: <code style="background:#f5f2eb; padding:2px 6px; border-radius:4px;">vendeur@bazzart.tn</code></p>
          <p>Mot de passe: <code style="background:#f5f2eb; padding:2px 6px; border-radius:4px;">password</code></p>
        </div>
      </section>
    </main>

    <div id="siteFooterMount"></div>

    <script src="../assets/js/data.js"></script>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/store.js"></script>
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/login.js"></script>
  </body>
</html>
